name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── 정적 분석 ─────────────────────────────────────────────────────────────
  static:
    name: Typecheck & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

  # ── 테스트 (Matrix Sharding) ──────────────────────────────────────────────
  test:
    name: Test (shard ${{ matrix.shard }}/${{ matrix.total }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
        total: [8]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Prepare report dir
        run: mkdir -p .vitest-reports

      - name: Run tests (shard ${{ matrix.shard }}/${{ matrix.total }})
        run: |
          npx vitest run \
            --reporter=blob \
            --reporter=default \
            --coverage \
            --coverage.reporter=json \
            --outputFile=.vitest-reports/shard-${{ matrix.shard }}.blob \
            --shard=${{ matrix.shard }}/${{ matrix.total }}
        env:
          NODE_OPTIONS: --max-old-space-size=2048
          SKIP_VEC_TESTS: "1"
          SKIP_RECHUNK_TESTS: "1"
        timeout-minutes: 25

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-blob-${{ matrix.shard }}
          path: .vitest-reports/
          retention-days: 1
          if-no-files-found: ignore

  # ── Coverage 병합 + 배지 ──────────────────────────────────────────────────
  coverage:
    name: Merge Reports & Coverage
    needs: test
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download all blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: vitest-blob-*
          path: .vitest-reports/
          merge-multiple: true

      - name: Merge reports & generate coverage
        run: |
          npx vitest run \
            --mergeReports=.vitest-reports \
            --coverage \
            --coverage.reporter=text \
            --coverage.reporter=json-summary \
            --coverage.reporter=html \
            --coverage.reportsDirectory=coverage
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        timeout-minutes: 15

      - name: Coverage summary
        if: always()
        run: |
          if [ -f ./coverage/coverage-summary.json ]; then
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              const fmt = (v) => v.pct.toFixed(1) + '%';
              console.log('## Coverage');
              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Lines | ' + fmt(s.lines) + ' |');
              console.log('| Statements | ' + fmt(s.statements) + ' |');
              console.log('| Functions | ' + fmt(s.functions) + ' |');
              console.log('| Branches | ' + fmt(s.branches) + ' |');
            " >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ Coverage report not generated" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload merged coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Generate badge JSONs
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p .badges

          if [ -f coverage/coverage-summary.json ]; then
            PCT=$(node -e "console.log(require('./coverage/coverage-summary.json').total.lines.pct)")
            if (( $(echo "$PCT >= 80" | bc -l) )); then COLOR="brightgreen"
            elif (( $(echo "$PCT >= 60" | bc -l) )); then COLOR="green"
            elif (( $(echo "$PCT >= 40" | bc -l) )); then COLOR="yellow"
            else COLOR="red"; fi
            echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${PCT}%\",\"color\":\"${COLOR}\"}" > .badges/coverage.json
          else
            echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"N/A\",\"color\":\"lightgrey\"}" > .badges/coverage.json
          fi

          LOC=$(find src -name '*.ts' -not -path '*/locales/*' -not -name '*.d.ts' | xargs wc -l | tail -1 | awk '{print $1}')
          if [ "$LOC" -ge 1000 ]; then LOC_LABEL=$(echo "scale=1; $LOC / 1000" | bc)"k"; else LOC_LABEL="$LOC"; fi
          echo "{\"schemaVersion\":1,\"label\":\"lines of code\",\"message\":\"${LOC_LABEL}\",\"color\":\"blue\"}" > .badges/loc.json

      - name: Deploy badge to gh-pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .badges
          destination_dir: badges
          keep_files: true
          publish_branch: gh-pages
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
