services:
  docker-proxy:
    image: tecnativa/docker-socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      CONTAINERS: 1          # create/start/kill/inspect/list/events/stats
      IMAGES: 0
      NETWORKS: 0
      VOLUMES: 0
      POST: 1                # container create/start/kill 등 POST 허용
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

  redis:
    image: redis:7-alpine
    container_name: soulflow-redis
    restart: unless-stopped
    profiles: [redis]                          # docker compose --profile redis up
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"

  ollama:
    image: ollama/ollama:latest
    container_name: orchestrator-llm
    restart: unless-stopped
    profiles: [gpu]                            # docker compose --profile gpu up
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    devices:
      - nvidia.com/gpu=all
    deploy:
      resources:
        limits:
          memory: 6G
          cpus: "4"

  orchestrator:
    build:
      context: .
      target: full                             # CLI 에이전트(Claude, Codex, Gemini) 포함
    container_name: soulflow-orchestrator
    restart: unless-stopped
    depends_on:
      docker-proxy:
        condition: service_started
    ports:
      - "${DASHBOARD_PORT:-4200}:4200"
    volumes:
      - ${WORKSPACE_PATH:-./workspace2}:/data
      - cli-auth-claude:/root/.claude
      - cli-auth-codex:/root/.codex
      - cli-auth-gemini:/root/.gemini
    environment:
      - WORKSPACE=/data
      - NODE_ENV=production
      - SKIP_INSTANCE_LOCK=1
      - DOCKER_HOST=tcp://docker-proxy:2375
      - BUS_BACKEND=${BUS_BACKEND:-redis}
      - BUS_REDIS_URL=${BUS_REDIS_URL:-redis://redis:6379}
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"

volumes:
  redis-data:
  ollama-data:
  cli-auth-claude:
  cli-auth-codex:
  cli-auth-gemini:
