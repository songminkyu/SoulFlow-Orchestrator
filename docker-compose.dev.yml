# 개발 오버라이드: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  orchestrator:
    build:
      context: .
      target: dev                       # deps(devDeps 포함) + CLI 바이너리
    working_dir: /build
    command: sh -c "npm install --prefer-offline 2>/dev/null; (cd web && npm install --prefer-offline 2>/dev/null && npx vite build --watch) & npx tsx watch --clear-screen=false src/main.ts"
    volumes:
      - .:/build
      - /build/node_modules
      - /build/web/node_modules
      - ${WORKSPACE_PATH:-./workspace2}:/data
      - cli-auth-claude:/root/.claude
      - cli-auth-codex:/root/.codex
      - cli-auth-gemini:/root/.gemini
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WORKSPACE=/data
      - NODE_ENV=development
      - SKIP_INSTANCE_LOCK=1
      - DOCKER_HOST=                    # base의 tcp://docker-proxy:2375 해제 → 직접 마운트한 소켓 사용
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
volumes:
  cli-auth-claude:
  cli-auth-codex:
  cli-auth-gemini:
