<text x="1589.968" y="185.6" text-anchor="middle" dy="0.35em" font-size="19.2" font-weight="400" letter-spacing="-0.384" fill="var(--_text)">&quot;🟡 followup&lt;br/&gt;Queue for next turn&lt;br/&gt;after completion&quot;</text>
<text x="2272.016" y="185.6" text-anchor="middle" dy="0.35em" font-size="19.2" font-weight="400" letter-spacing="-0.384" fill="var(--_text)">&quot;🟢 collect&lt;br/&gt;Batch multiple messages&lt;br/&gt;deliver together&quot;</text>
