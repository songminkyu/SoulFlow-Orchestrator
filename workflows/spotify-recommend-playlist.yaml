title: "Spotify Recommendation Playlist Flow"
objective: "{{objective}}"
variables:
  objective: "Spotify API로 추천곡을 받아 플레이리스트를 만들고 재생한다"
  seed_query: "NewJeans"
  playlist_name: "AI Recommended Mix"
  playlist_description: "Generated by Spotify Recommendation Playlist Flow"
  recommendation_limit: 10
  max_playlist_items: 30
  market: "KR"
  prefer_device_name: ""
  is_public: false
  autoplay: true

phases:
  - phase_id: "spotify_recommend_create_play"
    title: "Recommend, Create Playlist, and Play"
    failure_policy: "fail_fast"
    agents:
      - agent_id: "spotify_api_operator"
        role: "spotify_workflow_operator"
        label: "Spotify API Operator"
        backend: "codex_cli"
        tools: ["oauth_fetch"]
        system_prompt: |
          You execute Spotify Web API workflow with oauth_fetch(service_id="spotify").
          Goal: search a seed track, get recommendations, create playlist, add tracks, and start playback.

          Input variables:
          - seed_query: {{seed_query}}
          - playlist_name: {{playlist_name}}
          - playlist_description: {{playlist_description}}
          - recommendation_limit: {{recommendation_limit}}
          - max_playlist_items: {{max_playlist_items}}
          - market: {{market}}
          - prefer_device_name: {{prefer_device_name}}
          - is_public: {{is_public}}
          - autoplay: {{autoplay}}

          URL/encoding rules:
          - Always URL-encode query params.
          - Clamp recommendation_limit to 1..20.
          - Clamp max_playlist_items to 1..100.
          - market must be 2-letter country code; if invalid, fallback to "US".
          - If seed_query is empty, fallback to "Top Hits".

          Required endpoint order:
          1) GET https://api.spotify.com/v1/me
          2) GET https://api.spotify.com/v1/search?q=<seed_query>&type=track&limit=1&market=<market>
             - If no track found, retry once with q=Top%20Hits and use first track result.
          3) GET https://api.spotify.com/v1/recommendations?seed_tracks=<seed_track_id>&limit=<recommendation_limit>&market=<market>
             - If recommendations returns empty tracks, fallback:
               a) Read first artist id from seed_track
               b) GET https://api.spotify.com/v1/artists/<artist_id>/top-tracks?market=<market>
               c) Use top tracks as fallback candidates
          4) POST https://api.spotify.com/v1/me/playlists
             body: { name, description, public } using playlist_name + playlist_description
          5) POST https://api.spotify.com/v1/playlists/{playlist_id}/items
             body: { uris: [...] }
          6) If autoplay=true:
             - GET https://api.spotify.com/v1/me/player/devices
             - Choose device by priority:
               a) exact match with prefer_device_name (case-insensitive)
               b) active device
               c) first available device
             - PUT https://api.spotify.com/v1/me/player/play (device_id 있으면 query로 포함)
               body: { context_uri: <created_playlist_uri> }

          Rules:
          - Always use oauth_fetch with service_id="spotify".
          - Add at least one seed track and recommendation tracks to playlist.
          - Deduplicate track URIs before adding.
          - Keep total added tracks <= max_playlist_items.
          - Max 100 URIs in a single add-items call. If needed, chunk requests.
          - If there is no active playback device, return a clear warning but still mark playlist creation as success.
          - Handle API errors (401/403/404/429) with actionable messages.
          - Do not output markdown. Return JSON only.

          Return strict JSON only:
          {
            "ok": true|false,
            "user_id": "string|null",
            "seed_query": "string",
            "seed_track": {"id":"string","name":"string","artist":"string"}|null,
            "playlist": {"id":"string","uri":"string","external_url":"string|null","name":"string"}|null,
            "source_mode": "recommendations|artist_top_tracks|fallback_search",
            "track_count_added": 0,
            "playback_started": true|false,
            "device_used": {"id":"string","name":"string"}|null,
            "selected_market": "string",
            "warnings": ["..."],
            "errors": ["..."]
          }
        max_turns: 10

    critic:
      backend: "codex_cli"
      system_prompt: |
        Validate the agent output:
        - JSON parseable
        - includes required fields
        - ok is boolean; if ok=false then errors must be non-empty
        - warnings/errors must be arrays of strings
        - selected_market should be 2-letter uppercase country code
        - source_mode must be one of recommendations|artist_top_tracks|fallback_search
        - playlist creation/addition status is explicit
        - playback status and warnings are explicit
      gate: true
      on_rejection: "retry_targeted"
      max_retries: 1
