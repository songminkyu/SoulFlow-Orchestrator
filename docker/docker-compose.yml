services:
  docker-proxy:
    image: tecnativa/docker-socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      CONTAINERS: 1
      IMAGES: 0
      NETWORKS: 0
      VOLUMES: 0
      POST: 1
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: ${BUILD_TARGET:-full}
    image: soulflow-orchestrator
    container_name: ${PROJECT_NAME:-soulflow}-orchestrator
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-4200}:4200"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      WORKSPACE: /data
      BUS_BACKEND: ${BUS_BACKEND:-redis}
      BUS_REDIS_URL: ${BUS_REDIS_URL:-redis://redis:6379}
      REDIS_URL: redis://redis:6379
      DEBUG: ${DEBUG:-false}
      SKIP_INSTANCE_LOCK: ${SKIP_INSTANCE_LOCK:-0}
      NODE_OPTIONS: "--max-old-space-size=${NODE_HEAP_MB:-768}"
    volumes:
      - ${HOST_WORKSPACE:-.}:/data
      - ${HOST_WORKSPACE:-.}/.agents/.claude:/root/.claude
      - ${HOST_WORKSPACE:-.}/.agents/.codex:/root/.codex
      - ${HOST_WORKSPACE:-.}/.agents/.gemini:/root/.gemini
    # Agent Browser: /dev/shm 공유 메모리 (Chromium 렌더링 안정성)
    shm_size: "256m"
    deploy:
      resources:
        limits:
          memory: ${MEMORY:-1G}
          cpus: "${CPUS:-2}"

  chunker:
    image: soulflow-orchestrator
    container_name: ${PROJECT_NAME:-soulflow}-chunker
    restart: unless-stopped
    command: ["node", "dist/chunker/main.js"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      REDIS_URL: redis://redis:6379
      NODE_OPTIONS: "--max-old-space-size=${CHUNKER_HEAP_MB:-512}"
    deploy:
      resources:
        limits:
          memory: ${CHUNKER_MEMORY:-512M}
          cpus: "${CHUNKER_CPUS:-1}"

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-soulflow}-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"

volumes:
  redis-data:
    driver: local

networks:
  default:
    name: ${PROJECT_NAME:-soulflow}-network
